name: Update activity graph

on:
  schedule:
    - cron: "0 4 * * *"   # runs daily at 04:00 UTC
  push:
    paths:
      - ".github/workflows/activity-graph.yml"
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate activity graph
        uses: Ashutosh00710/github-readme-activity-graph@master
        with:
          USERNAME: coder-with-ai
          THEME: github-dark
          HIDE_BORDER: true
          bg_color: 0D1117
          
      - name: Rename generated file
        run: |
          mv github-readme-activity-graph.svg profile/activity-graph.svg
          
      - name: Commit activity graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/activity-graph.svg
          git commit -m "Update activity graph" || exit 0
          git push
