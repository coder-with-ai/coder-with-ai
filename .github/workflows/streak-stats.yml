name: 🔄 Auto Update README Cache Busters

on:
  schedule:
    # Runs at 12:00 AM UTC daily
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔧 Update Cache Buster Parameters
        run: python3 .github/scripts/update_cache.py
      
      - name: 📊 Check if changes were made
        id: verify
        run: |
          if git diff --quiet README.md; then
            echo "No changes needed"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changes=true" >> $GITHUB_OUTPUT
            git diff README.md
          fi
      
      - name: 📤 Commit and Push Changes
        if: steps.verify.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add README.md
          git commit -m "♻️ Auto-update cache buster: $(date +%Y-%m-%d) [skip ci]"
          git push
      
      - name: ✅ Success Message
        run: |
          echo "🎉 README cache busters updated successfully!"
          echo "All images will be refreshed today"
