name: 🔄 Auto Update README Cache Busters

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  push:
    branches:
      - main
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔥 Generate Streak Stats SVG
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0D1117
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📊 Check if changes were made
        id: verify
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Forcing update due to ${{ github.event_name }} event."
          elif ! git diff --quiet profile/streak.svg; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Stats changes detected!"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          fi
      
      - name: 🔧 Update Cache Buster Parameters
        if: steps.verify.outputs.changes == 'true'
        run: python3 .github/scripts/update_cache.py
      
      - name: 📤 Commit and Push Changes
        if: steps.verify.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add README.md profile/streak.svg
          git commit -m "♻️ Auto-update streak stats and cache busters [skip ci]"
          git push
      
      - name: ✅ Success Message
        run: |
          echo "🎉 README cache busters updated successfully!"
          echo "All images will be refreshed today"
