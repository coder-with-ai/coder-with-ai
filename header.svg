<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <g opacity="0.22">
    <path d="M0,235 Q150,205 300,235 T600,235 T900,235 T1200,235 T1500,235 V300 H0 Z" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="0,0; -300,0; 0,0" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>
  <g opacity="0.32">
    <path d="M0,255 Q150,275 300,255 T600,255 T900,255 T1200,255 T1500,255 V300 H0 Z" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="0,0; 300,0; 0,0" dur="6.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="600" y="128" font-family="Segoe UI, Verdana, Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0">
    Hey, I'm Anuj 👋
    <animate attributeName="opacity" from="0" to="1" dur="1.1s" begin="0.1s" fill="freeze"/>
  </text>

  <text x="600" y="178" font-family="Segoe UI, Verdana, Arial, sans-serif" font-size="23" fill="#E0F2FE" text-anchor="middle" opacity="0">
    B.Tech CS - AI &amp; ML Student · Shipping Reliable Software
    <animate attributeName="opacity" from="0" to="1" dur="1.1s" begin="0.6s" fill="freeze"/>
  </text>
</svg>
